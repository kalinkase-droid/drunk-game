<!DOCTYPE html>
<html>
<head>
    <title>Drunk Escape</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 500,
    backgroundColor: "#2c2c2c",
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

const game = new Phaser.Game(config);

let player;
let husband;
let cursors;
let text;

function preload() {
    // простые спрайты (не квадраты)
    this.load.image('wife', 'https://labs.phaser.io/assets/sprites/phaser-dude.png');
    this.load.image('husband', 'https://labs.phaser.io/assets/sprites/robot.png');
}

function create() {
    cursors = this.input.keyboard.createCursorKeys();

    // комнаты (визуально)
    this.add.rectangle(150,250,300,500,0xffffff);
    this.add.rectangle(400,125,300,250,0xffffff);
    this.add.rectangle(400,375,300,250,0xffffff);

    // стены
    this.add.rectangle(260,100,10,200,0x000000);
    this.add.rectangle(260,400,10,200,0x000000);
    this.add.rectangle(530,100,10,200,0x000000);
    this.add.rectangle(530,400,10,200,0x000000);

    // персонажи
    player = this.physics.add.sprite(100,250,'wife').setScale(0.5);
    husband = this.physics.add.sprite(600,250,'husband').setScale(0.4);

    text = this.add.text(10,10,"", {font:"16px Arial", fill:"#fff"});
}

function update() {
    player.setVelocity(0);

    if (cursors.left.isDown) player.setVelocityX(-200);
    if (cursors.right.isDown) player.setVelocityX(200);
    if (cursors.up.isDown) player.setVelocityY(-200);
    if (cursors.down.isDown) player.setVelocityY(200);

    // муж тупо преследует
    let dx = player.x - husband.x;
    let dy = player.y - husband.y;

    husband.x += dx * 0.01;
    husband.y += dy * 0.01;

    // текст поведения
    let r = Math.random();
    if (r < 0.01) {
        if (r < 0.003) text.setText("golf...");
        else text.setText("too much beer...");
    }
}
</script>

</body>
</html>
