<!DOCTYPE html>
<html>
<head>
    <title>Drunk Escape</title>
    <style>
        body {
            margin: 0;
            background: #222;
        }

        canvas {
            display: block;
            margin: auto;
            background: #eee;
        }
    </style>
</head>
<body>

<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// жена (игрок)
let player = {
    x: 50,
    y: 50,
    size: 20,
    speed: 2
};

// муж
let husband = {
    x: 400,
    y: 300,
    size: 25,
    speed: 1.5
};

// управление
let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// комнаты (3 комнаты)
let walls = [
    // стены комнат
    {x:200,y:0,w:10,h:200}, // перегородка 1
    {x:400,y:200,w:10,h:200}, // перегородка 2
];

// движение
function movePlayer() {
    if(keys["ArrowUp"]) player.y -= player.speed;
    if(keys["ArrowDown"]) player.y += player.speed;
    if(keys["ArrowLeft"]) player.x -= player.speed;
    if(keys["ArrowRight"]) player.x += player.speed;
}

// муж идёт к игроку
function moveHusband() {
    let dx = player.x - husband.x;
    let dy = player.y - husband.y;

    husband.x += dx * 0.01;
    husband.y += dy * 0.01;
}

// рисуем
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // стены
    ctx.fillStyle = "black";
    walls.forEach(w => ctx.fillRect(w.x,w.y,w.w,w.h));

    // жена (кудрявая типа кружок с "волосами")
    ctx.fillStyle = "pink";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "black";
    ctx.fillText("~~~", player.x-10, player.y-20); // кудри 😄

    // муж
    ctx.fillStyle = "green";
    ctx.fillRect(husband.x, husband.y, husband.size, husband.size);

    ctx.fillStyle = "black";
    ctx.fillText("beer...", husband.x, husband.y-10);

}

// игра
function gameLoop() {
    movePlayer();
    moveHusband();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
