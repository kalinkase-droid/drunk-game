<!DOCTYPE html>
<html>
<head>
    <title>Drunk Escape</title>
    <style>
        body { margin:0; background:#222; }
        canvas { display:block; margin:auto; background:#ddd; }
    </style>
</head>
<body>

<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// игрок (жена)
let player = {x:100,y:250,speed:2,dx:0,dy:0};

// муж
let husband = {
    x:600,y:250,
    speed:1.3,
    mode:"chase",
    timer:0,
    text:"beer..."
};

// управление
let keys = {};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

// карта
let walls = [
    {x:0,y:0,w:800,h:10},
    {x:0,y:490,w:800,h:10},
    {x:0,y:0,w:10,h:500},
    {x:790,y:0,w:10,h:500},

    {x:260,y:0,w:10,h:200},
    {x:260,y:300,w:10,h:200},

    {x:530,y:0,w:10,h:200},
    {x:530,y:300,w:10,h:200},
];

let doors = [
    {x:260,y:200,w:10,h:100},
    {x:530,y:200,w:10,h:100},
];

// столкновения
function isColliding(x,y){
    for(let w of walls){
        if(x > w.x-10 && x < w.x+w.w && y > w.y-10 && y < w.y+w.h){
            return true;
        }
    }
    return false;
}

// ПЬЯНОЕ управление 😄
function movePlayer(){
    if(keys["ArrowUp"]) player.dy -= 0.1;
    if(keys["ArrowDown"]) player.dy += 0.1;
    if(keys["ArrowLeft"]) player.dx -= 0.1;
    if(keys["ArrowRight"]) player.dx += 0.1;

    // инерция
    player.dx *= 0.95;
    player.dy *= 0.95;

    let nx = player.x + player.dx;
    let ny = player.y + player.dy;

    if(!isColliding(nx,ny)){
        player.x = nx;
        player.y = ny;
    }
}

// поведение мужа
function moveHusband(){
    husband.timer++;

    // переключение режимов
    if(husband.timer % 200 === 0){
        let r = Math.random();
        if(r < 0.4){
            husband.mode = "chase";
            husband.text = "I SEE YOU!";
        } else if(r < 0.7){
            husband.mode = "golf";
            husband.text = "golf... golf...";
        } else {
            husband.mode = "beer";
            husband.text = "too much beer...";
        }
    }

    if(husband.mode==="chase"){
        let dx = player.x - husband.x;
        let dy = player.y - husband.y;

        let nx = husband.x + dx * 0.015;
        let ny = husband.y + dy * 0.015;

        if(!isColliding(nx,ny)){
            husband.x = nx;
            husband.y = ny;
        }
    }

    if(husband.mode==="beer"){
        // шатается
        husband.x += Math.sin(husband.timer * 0.1);
        husband.y += Math.cos(husband.timer * 0.1);
    }
}

// жена
function drawPlayer(){
    ctx.fillStyle = "black";

    ctx.fillRect(player.x, player.y, 12, 20);

    ctx.beginPath();
    ctx.arc(player.x+6, player.y-5, 5, 0, Math.PI*2);
    ctx.fill();

    ctx.fillText("~~~", player.x-6, player.y-10);
}

// муж
function drawHusband(){
    ctx.fillStyle = "darkgreen";

    ctx.fillRect(husband.x, husband.y, 14, 22);

    ctx.beginPath();
    ctx.arc(husband.x+7, husband.y-5, 6, 0, Math.PI*2);
    ctx.fill();

    // баббл
    ctx.fillStyle="white";
    ctx.fillRect(husband.x-40, husband.y-35, 80, 20);

    ctx.fillStyle="black";
    ctx.fillText(husband.text, husband.x-35, husband.y-20);
}

// карта
function drawMap(){
    ctx.fillStyle = "black";
    for(let w of walls){
        ctx.fillRect(w.x,w.y,w.w,w.h);
    }

    ctx.fillStyle = "brown";
    for(let d of doors){
        ctx.fillRect(d.x,d.y,d.w,d.h);
    }
}

// игра
function draw(){
    ctx.clearRect(0,0,800,500);

    drawMap();
    drawPlayer();
    drawHusband();
}

function gameLoop(){
    movePlayer();
    moveHusband();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
