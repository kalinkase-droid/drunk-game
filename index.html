<!DOCTYPE html>
<html>
<head>
    <title>Drunk Escape</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 900,
    height: 500,
    physics: { default: 'arcade' },
    scene: { preload, create, update }
};

let player, husband, cursors, msg;
let lastSpeak = 0;

new Phaser.Game(config);

function preload() {
    // НОРМ СПРАЙТЫ
    this.load.spritesheet('wife', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth:32, frameHeight:48 });
    this.load.image('husband', 'https://labs.phaser.io/assets/sprites/robot.png');

    // ФОН
    this.load.image('floor', 'https://labs.phaser.io/assets/skies/gradient26.png');
}

function create() {
    this.add.image(450,250,'floor').setScale(2);

    // КОМНАТЫ (но уже выглядят как комнаты)
    let walls = this.physics.add.staticGroup();

    walls.create(450,10,null).setDisplaySize(900,20).refreshBody();
    walls.create(450,490,null).setDisplaySize(900,20).refreshBody();
    walls.create(10,250,null).setDisplaySize(20,500).refreshBody();
    walls.create(890,250,null).setDisplaySize(20,500).refreshBody();

    // разделители комнат
    walls.create(300,150,null).setDisplaySize(20,300).refreshBody();
    walls.create(600,350,null).setDisplaySize(20,300).refreshBody();

    // ПЕРСОНАЖИ
    player = this.physics.add.sprite(100,250,'wife');
    husband = this.physics.add.sprite(700,250,'husband').setScale(0.5);

    player.setCollideWorldBounds(true);
    husband.setCollideWorldBounds(true);

    this.physics.add.collider(player, walls);
    this.physics.add.collider(husband, walls);

    cursors = this.input.keyboard.createCursorKeys();

    msg = this.add.text(20,20,"",{font:"20px Arial", fill:"#fff"});

    // АНИМАЦИЯ
    this.anims.create({
        key:'walk',
        frames:this.anims.generateFrameNumbers('wife',{start:0,end:3}),
        frameRate:8,
        repeat:-1
    });
}

function update(time) {

    // ДВИЖЕНИЕ ЖЕНЫ
    player.setVelocity(0);

    if (cursors.left.isDown) {
        player.setVelocityX(-200);
        player.anims.play('walk', true);
        player.flipX = true;
    }
    else if (cursors.right.isDown) {
        player.setVelocityX(200);
        player.anims.play('walk', true);
        player.flipX = false;
    }
    else if (cursors.up.isDown) {
        player.setVelocityY(-200);
        player.anims.play('walk', true);
    }
    else if (cursors.down.isDown) {
        player.setVelocityY(200);
        player.anims.play('walk', true);
    }
    else {
        player.anims.stop();
    }

    // МУЖ (тупо преследует, но живее)
    let dx = player.x - husband.x;
    let dy = player.y - husband.y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < 300) {
        husband.setVelocity(dx * 0.5, dy * 0.5);
    } else {
        husband.setVelocity(0);
    }

    // ФРАЗЫ
    if (time > lastSpeak + 2000) {
        let phrases = [
            "too much beer...",
            "golf... golf...",
            "where are you??",
            "I SEE YOU"
        ];
        msg.setText(phrases[Math.floor(Math.random()*phrases.length)]);
        lastSpeak = time;
    }

    // ПРОИГРЫШ
    if (dist < 40) {
        msg.setText("CAUGHT 💀");
        player.setTint(0xff0000);
    }
}
</script>

</body>
</html>
