<!DOCTYPE html>
<html>
<head>
<title>Drunk Escape</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 900,
    height: 500,
    physics: { default: 'arcade' },
    scene: { preload, create, update }
};

let player, husband, cursors, msg;

new Phaser.Game(config);

function preload() {

    // персонажи
    this.load.spritesheet('wife',
        'https://labs.phaser.io/assets/sprites/dude.png',
        { frameWidth: 32, frameHeight: 48 }
    );

    this.load.image('husband',
        'https://labs.phaser.io/assets/sprites/zombie.png'
    );

    // норм пол (уже не сетка)
    this.load.image('floor',
        'https://labs.phaser.io/assets/tilemaps/tiles/stone.png'
    );

    // мебель (реальная)
    this.load.image('sofa',
        'https://labs.phaser.io/assets/sprites/platform.png'
    );

    this.load.image('table',
        'https://labs.phaser.io/assets/sprites/crate.png'
    );
}

function create() {

    // фон
    this.add.tileSprite(450,250,900,500,'floor');

    // мебель
    this.add.image(200,350,'sofa').setScale(2,1);
    this.add.image(500,250,'table').setScale(1.5);

    // персонажи
    player = this.physics.add.sprite(150,250,'wife').setScale(1.2);
    husband = this.physics.add.sprite(700,250,'husband').setScale(0.8);

    player.setCollideWorldBounds(true);
    husband.setCollideWorldBounds(true);

    cursors = this.input.keyboard.createCursorKeys();

    msg = this.add.text(20,20,"",{font:"20px Arial", fill:"#ffffff"});

    // анимация
    this.anims.create({
        key:'walk',
        frames:this.anims.generateFrameNumbers('wife',{start:0,end:3}),
        frameRate:8,
        repeat:-1
    });

    // килл
    this.physics.add.overlap(player, husband, () => {
        msg.setText("💀 CAUGHT");
        this.physics.pause();
        player.setTint(0xff0000);
    });
}

function update(time) {

    player.setVelocity(0);

    if (cursors.left.isDown) {
        player.setVelocityX(-220);
        player.anims.play('walk', true);
        player.flipX = true;
    }
    else if (cursors.right.isDown) {
        player.setVelocityX(220);
        player.anims.play('walk', true);
        player.flipX = false;
    }
    else if (cursors.up.isDown) {
        player.setVelocityY(-220);
        player.anims.play('walk', true);
    }
    else if (cursors.down.isDown) {
        player.setVelocityY(220);
        player.anims.play('walk', true);
    }
    else {
        player.anims.stop();
    }

    // муж реально преследует
    let dx = player.x - husband.x;
    let dy = player.y - husband.y;

    husband.setVelocity(dx * 1.2, dy * 1.2);

    // фразы
    if (Math.random() < 0.01) {
        let phrases = [
            "too much beer...",
            "golf...",
            "WHERE ARE YOU",
            "I SEE YOU"
        ];
        msg.setText(phrases[Math.floor(Math.random()*phrases.length)]);
    }
}
</script>

</body>
</html>
